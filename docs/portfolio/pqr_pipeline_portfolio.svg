<svg viewBox="0 0 720 572" xmlns="http://www.w3.org/2000/svg" role="img" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <title>PQR Pipeline Diagram — Portfolio</title>
  <desc>Flow diagram showing how PDF Quality Report processes documents: PDF input through Docling parser to normalized blocks, then quality checks producing a GO/REVIEW/BLOCK decision, and finally clean Markdown and chunk records as output.</desc>

  <defs>
    <filter id="pf_pqrCardShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="pf_arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#64748b"/>
    </marker>
    <marker id="pf_arrow-accent" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#4f46e5"/>
    </marker>
  </defs>

  <rect width="720" height="572" fill="#f1f5f9"/>
  <rect width="720" height="40" fill="#0f172a"/>
  <text x="360" y="26" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">PDF Quality Report — Pipeline</text>
  <text x="360" y="38" text-anchor="middle" fill="#94a3b8" font-size="10">Portfolio presentation · README / proposals (same flow as canonical)</text>

  <g transform="translate(0, 44)">
    <rect width="720" height="504" fill="#ffffff"/>

    <!-- INPUT STAGE -->
    <rect x="20" y="20" width="140" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="90" y="46" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="600">PDF</text>
    <text x="90" y="64" text-anchor="middle" fill="#64748b" font-size="11">Input Document</text>

    <line x1="160" y1="50" x2="195" y2="50" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#pf_arrow)"/>

    <rect x="200" y="20" width="140" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="270" y="46" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="600">Docling Parser</text>
    <text x="270" y="64" text-anchor="middle" fill="#64748b" font-size="11">+ OCR if scanned</text>

    <line x1="340" y1="50" x2="375" y2="50" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#pf_arrow)"/>

    <rect x="380" y="20" width="160" height="60" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="460" y="46" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="600">Normalized Blocks</text>
    <text x="460" y="64" text-anchor="middle" fill="#64748b" font-size="11">Structured JSON</text>

    <line x1="460" y1="80" x2="460" y2="125" stroke="#4f46e5" stroke-width="2" marker-end="url(#pf_arrow-accent)"/>

    <!-- QUALITY REPORT BOX -->
    <rect x="280" y="130" width="360" height="200" rx="10" fill="#fafafa" stroke="#4f46e5" stroke-width="2" filter="url(#pf_pqrCardShadow)"/>
    <text x="460" y="158" text-anchor="middle" fill="#0f172a" font-size="15" font-weight="700">Quality Report</text>

    <rect x="300" y="172" width="155" height="28" rx="5" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="377" y="191" text-anchor="middle" fill="#334155" font-size="11">Required Field Coverage</text>

    <rect x="465" y="172" width="155" height="28" rx="5" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="542" y="191" text-anchor="middle" fill="#334155" font-size="11">Provenance Completeness</text>

    <rect x="300" y="206" width="155" height="28" rx="5" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="377" y="225" text-anchor="middle" fill="#334155" font-size="11">BBox Sanity</text>

    <rect x="465" y="206" width="155" height="28" rx="5" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="542" y="225" text-anchor="middle" fill="#334155" font-size="11">Content vs Noise Ratio</text>

    <rect x="300" y="240" width="155" height="28" rx="5" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="377" y="259" text-anchor="middle" fill="#334155" font-size="11">Text Usefulness</text>

    <rect x="465" y="240" width="155" height="28" rx="5" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="542" y="259" text-anchor="middle" fill="#334155" font-size="11">Text Extraction Health</text>

    <rect x="315" y="280" width="60" height="26" rx="13" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
    <text x="345" y="298" text-anchor="middle" fill="#15803d" font-size="11" font-weight="700">GO</text>

    <rect x="395" y="280" width="80" height="26" rx="13" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="435" y="298" text-anchor="middle" fill="#b45309" font-size="11" font-weight="700">REVIEW</text>

    <rect x="495" y="280" width="70" height="26" rx="13" fill="#fee2e2" stroke="#ef4444" stroke-width="1.2"/>
    <text x="530" y="298" text-anchor="middle" fill="#b91c1c" font-size="11" font-weight="700">BLOCK</text>

    <line x1="390" y1="330" x2="390" y2="370" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#pf_arrow)"/>
    <line x1="530" y1="330" x2="530" y2="370" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#pf_arrow)"/>

    <rect x="300" y="375" width="170" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="385" y="401" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="600">Clean Markdown</text>
    <text x="385" y="419" text-anchor="middle" fill="#64748b" font-size="11">Readable output</text>

    <rect x="490" y="375" width="170" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="575" y="401" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="600">Chunk Records</text>
    <text x="575" y="419" text-anchor="middle" fill="#64748b" font-size="11">JSONL for RAG</text>

    <text x="12" y="50" fill="#94a3b8" font-size="10" font-weight="600" transform="rotate(-90,12,50)" text-anchor="middle">INPUT</text>
    <text x="12" y="230" fill="#94a3b8" font-size="10" font-weight="600" transform="rotate(-90,12,230)" text-anchor="middle">QUALITY</text>
    <text x="12" y="405" fill="#94a3b8" font-size="10" font-weight="600" transform="rotate(-90,12,405)" text-anchor="middle">OUTPUT</text>

    <line x1="30" y1="108" x2="690" y2="108" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="30" y1="355" x2="690" y2="355" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
  </g>
  <rect x="0" y="548" width="720" height="24" fill="#e2e8f0"/>
  <text x="360" y="564" text-anchor="middle" fill="#475569" font-size="9">pdf-quality-report · illustrative only — see repository README for scope</text>
</svg>
