<svg viewBox="0 0 740 480" xmlns="http://www.w3.org/2000/svg" role="img" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <title>PQR Before/After Comparison</title>
  <desc>Side-by-side comparison showing raw parser output on the left versus PQR quality report output on the right.</desc>

  <!-- Background -->
  <rect width="740" height="480" fill="white" rx="4"/>

  <!-- BEFORE PANEL -->
  <rect x="10" y="10" width="350" height="460" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="10" y="10" width="350" height="40" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <rect x="10" y="35" width="350" height="15" fill="#fef2f2"/>
  <text x="185" y="36" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="700">BEFORE — Raw Parser Output</text>

  <text x="24" y="72" fill="#666" font-size="9.5" font-family="monospace">
    <tspan x="24" dy="0">{"_name":"","type":"pdf-document",</tspan>
    <tspan x="24" dy="14">"description":{"logs":[{"component":</tspan>
    <tspan x="24" dy="14">"docling_parse_v4","status":"success"}]},</tspan>
    <tspan x="24" dy="14">"furniture":{"self_ref":"#/furniture",</tspan>
    <tspan x="24" dy="14">"children":[],parent":null,"content_layer":</tspan>
    <tspan x="24" dy="14">"furniture","name":"_root_","label":"unspec</tspan>
    <tspan x="24" dy="14">ified"},"body":{"self_ref":"#/body",</tspan>
    <tspan x="24" dy="14">"children":[{"cref":"#/texts/0"},{"cref":</tspan>
    <tspan x="24" dy="14">"#/texts/1"},{"cref":"#/texts/2"},{"cref":</tspan>
    <tspan x="24" dy="14">"#/texts/3"}],"parent":null,"name":"_root</tspan>
    <tspan x="24" dy="14">_","label":"unspecified"},"groups":[],</tspan>
    <tspan x="24" dy="14">"texts":[{"self_ref":"#/texts/0","parent":</tspan>
    <tspan x="24" dy="14">{"cref":"#/body"},"children":[],"label":</tspan>
    <tspan x="24" dy="14">"page_header","prov":[{"page_no":6,"bbox":</tspan>
    <tspan x="24" dy="14">{"l":72.0,"t":710.5,"r":285.3,"b":722.8,</tspan>
    <tspan x="24" dy="14">"coord_origin":"BOTTOMLEFT"},"charspan":</tspan>
    <tspan x="24" dy="14">[0,27]}],"orig":"Technologies 2019, 7,</tspan>
    <tspan x="24" dy="14">65","text":"Technologies 2019, 7, 65"},</tspan>
    <tspan x="24" dy="14">{"self_ref":"#/texts/1","parent":{"cref":</tspan>
    <tspan x="24" dy="14">"#/body"},"children":[],"label":"page_hea</tspan>
    <tspan x="24" dy="14">der","prov":[{"page_no":6,"bbox":{"l":521</tspan>
    <tspan x="24" dy="14">.2,"t":710.5,"r":540.1,"b":722.8 ...</tspan>
  </text>

  <text x="24" y="370" fill="#dc2626" font-size="10" font-weight="600">Problems:</text>
  <text x="24" y="386" fill="#dc2626" font-size="9.5">
    <tspan x="24" dy="0">• No structure validation</tspan>
    <tspan x="24" dy="14">• No quality assessment</tspan>
    <tspan x="24" dy="14">• Noise mixed with content</tspan>
    <tspan x="24" dy="14">• No provenance checks</tspan>
    <tspan x="24" dy="14">• No actionable decision</tspan>
    <tspan x="24" dy="14">• Not ready for downstream use</tspan>
  </text>

  <!-- ARROW -->
  <polygon points="365,240 375,228 375,235 395,235 395,245 375,245 375,252" fill="#6366f1"/>

  <!-- AFTER PANEL -->
  <rect x="400" y="10" width="330" height="460" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="400" y="10" width="330" height="40" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <rect x="400" y="35" width="330" height="15" fill="#f0fdf4"/>
  <text x="565" y="36" text-anchor="middle" fill="#16a34a" font-size="13" font-weight="700">AFTER — PQR Quality Report</text>

  <rect x="416" y="60" width="298" height="80" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="430" y="78" fill="#1a1a1a" font-size="11" font-weight="700">Summary</text>
  <text x="430" y="94" fill="#666" font-size="10">Total Blocks: 8</text>
  <text x="430" y="108" fill="#666" font-size="10">Hard Failures: 0 | Warnings: 1</text>
  <rect x="430" y="116" width="66" height="18" rx="9" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="463" y="129" text-anchor="middle" fill="#d97706" font-size="10" font-weight="700">REVIEW</text>

  <rect x="416" y="150" width="298" height="160" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="430" y="168" fill="#1a1a1a" font-size="11" font-weight="700">6 Quality Checks</text>
  <circle cx="434" cy="184" r="4" fill="#22c55e"/>
  <text x="444" y="188" fill="#555" font-size="10">Required Field Coverage — PASS</text>
  <circle cx="434" cy="200" r="4" fill="#22c55e"/>
  <text x="444" y="204" fill="#555" font-size="10">Provenance Completeness — PASS</text>
  <circle cx="434" cy="216" r="4" fill="#22c55e"/>
  <text x="444" y="220" fill="#555" font-size="10">BBox Sanity — PASS</text>
  <circle cx="434" cy="232" r="4" fill="#f59e0b"/>
  <text x="444" y="236" fill="#555" font-size="10">Content vs Noise Ratio — WARN</text>
  <circle cx="434" cy="248" r="4" fill="#22c55e"/>
  <text x="444" y="252" fill="#555" font-size="10">Text Usefulness — PASS</text>
  <circle cx="434" cy="264" r="4" fill="#22c55e"/>
  <text x="444" y="268" fill="#555" font-size="10">Text Extraction Health — PASS</text>
  <text x="430" y="296" fill="#666" font-size="9" font-style="italic">5,040 chars extracted | 0% empty blocks</text>

  <rect x="416" y="318" width="298" height="70" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="430" y="336" fill="#1a1a1a" font-size="11" font-weight="700">Ready Exports</text>
  <rect x="430" y="344" width="90" height="20" rx="4" fill="#eef2ff" stroke="#6366f1" stroke-width="0.8"/>
  <text x="475" y="358" text-anchor="middle" fill="#6366f1" font-size="9" font-weight="600">Markdown</text>
  <rect x="528" y="344" width="100" height="20" rx="4" fill="#eef2ff" stroke="#6366f1" stroke-width="0.8"/>
  <text x="578" y="358" text-anchor="middle" fill="#6366f1" font-size="9" font-weight="600">Chunk Records</text>
  <rect x="636" y="344" width="60" height="20" rx="4" fill="#eef2ff" stroke="#6366f1" stroke-width="0.8"/>
  <text x="666" y="358" text-anchor="middle" fill="#6366f1" font-size="9" font-weight="600">Report</text>
  <text x="430" y="380" fill="#666" font-size="9" font-style="italic">Traceable, structured, reviewable</text>

  <rect x="416" y="398" width="298" height="56" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="430" y="416" fill="#1a1a1a" font-size="11" font-weight="700">Recommended Action</text>
  <text x="430" y="434" fill="#666" font-size="10">Inspect 2 header blocks before downstream</text>
  <text x="430" y="446" fill="#666" font-size="10">use. All structural checks passed.</text>
</svg>
